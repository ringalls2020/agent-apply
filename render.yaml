databases:
  - name: main-postgres
    databaseName: agent_apply_main
    user: agent_apply_main
    plan: starter

  - name: jobs-postgres
    databaseName: agent_apply_jobs
    user: agent_apply_jobs
    plan: starter

services:
  - type: web
    name: main-api
    env: python
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: main-postgres
          property: connectionString
      - key: CLOUD_AUTOMATION_BASE_URL
        value: https://job-intel-api.onrender.com
      - key: CLOUD_AUTOMATION_SERVICE_ID
        value: main-api
      - key: CLOUD_AUTOMATION_AUDIENCE
        value: job-intel-api
      - key: CLOUD_AUTOMATION_SIGNING_SECRET
        sync: false
      - key: CLOUD_CALLBACK_SIGNING_SECRET
        sync: false
      - key: CLOUD_CALLBACK_SIGNATURE_SECRET
        sync: false
      - key: CLOUD_CALLBACK_AUDIENCE
        value: main-api
      - key: CLOUD_CALLBACK_ISSUER
        value: job-intel-api
      - key: DEFAULT_APPLY_DAILY_CAP
        value: "25"
      - key: ENABLE_DEV_RUN_AGENT
        value: "false"
      - key: ENABLE_RUN_AGENT_DISCOVERY_KICK
        value: "false"
      - key: JOB_LISTING_TTL_DAYS
        value: "21"
      - key: ENABLE_MAIN_SCHEMA_CREATE
        value: "false"

  - type: web
    name: job-intel-api
    env: python
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn cloud_automation.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JOBS_DATABASE_URL
        fromDatabase:
          name: jobs-postgres
          property: connectionString
      - key: CLOUD_AUTOMATION_SIGNING_SECRET
        sync: false
      - key: CLOUD_AUTOMATION_EXPECTED_AUDIENCE
        value: job-intel-api
      - key: CLOUD_AUTOMATION_EXPECTED_ISSUER
        value: main-api
      - key: DISCOVERY_INTERVAL_SECONDS
        value: "21600"
      - key: COMMON_CRAWL_INTERVAL_SECONDS
        value: "86400"
      - key: ENABLE_EMBEDDED_DISCOVERY_LOOP
        value: "false"
      - key: SEED_MANIFEST_URLS
        value: https://job-intel-api.onrender.com/internal/seed-manifests/companies.json
      - key: SEED_SOURCE_PAGE_URLS
        value: https://remoteintech.company/companies/,https://remoteintech.company/browse/worldwide/,https://remoteintech.company/browse/americas/,https://remoteintech.company/browse/europe/,https://remoteintech.company/browse/fully-remote/,https://remoteintech.company/browse/remote-first/,https://remoteintech.company/browse/remote-friendly/,https://remoteintech.company/browse/hybrid/,https://remoteintech.company/browse/python/,https://remoteintech.company/browse/javascript/
      - key: SEED_MANIFEST_BUILD_INTERVAL_SECONDS
        value: "86400"
      - key: SEED_MANIFEST_MAX_RETRIES
        value: "3"
      - key: SEED_MANIFEST_TIMEOUT_SECONDS
        value: "20"
      - key: SEED_MANIFEST_REQUIRE_SERVICE_JWT
        value: "true"
      - key: SEED_MANIFEST_ALLOWED_ISSUERS
        value: main-api,job-intel-api
      - key: SEED_MANIFEST_SERVICE_ISSUER
        value: job-intel-api
      - key: SEED_MANIFEST_SERVICE_AUDIENCE
        value: job-intel-api
      - key: SEED_MANIFEST_SERVICE_SIGNING_SECRET
        sync: false
      - key: DISCOVERY_USER_AGENT
        value: agent-apply-discovery-bot/1.0
      - key: DISCOVERY_CONTACT_EMAIL
        sync: false
      - key: DISCOVERY_DEFAULT_CRAWL_DELAY_SECONDS
        value: "2"
      - key: DISCOVERY_MAX_RETRIES
        value: "3"
      - key: DISCOVERY_TIMEOUT_SECONDS
        value: "20"
      - key: TOKEN_VALIDATION_RECHECK_HOURS
        value: "24"
      - key: COMMON_CRAWL_LOOKBACK_INDEXES
        value: "2"
      - key: COMMON_CRAWL_MAX_PAGES_PER_PATTERN
        value: "3"
      - key: COMMON_CRAWL_MAX_RECORDS_PER_PATTERN
        value: "1500"
      - key: MAIN_CALLBACK_URL
        value: https://main-api.onrender.com/internal/cloud/callbacks/apply-result
      - key: CLOUD_CALLBACK_ISSUER
        value: job-intel-api
      - key: CLOUD_CALLBACK_AUDIENCE
        value: main-api
      - key: CLOUD_CALLBACK_SIGNING_SECRET
        sync: false
      - key: CLOUD_CALLBACK_SIGNATURE_SECRET
        sync: false
      - key: JOB_LISTING_TTL_DAYS
        value: "21"
      - key: ENABLE_CLOUD_SCHEMA_CREATE
        value: "false"
      - key: CLOUD_HTTP_TIMEOUT_SECONDS
        value: "20"
      - key: CALLBACK_RETRY_MAX_ATTEMPTS
        value: "3"
      - key: CALLBACK_RETRY_BASE_DELAY_MS
        value: "250"

  - type: worker
    name: discovery-worker
    env: python
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cloud_automation.workers.discovery_worker
    envVars:
      - key: JOBS_DATABASE_URL
        fromDatabase:
          name: jobs-postgres
          property: connectionString
      - key: DISCOVERY_INTERVAL_SECONDS
        value: "21600"
      - key: SEED_MANIFEST_URLS
        value: https://job-intel-api.onrender.com/internal/seed-manifests/companies.json
      - key: SEED_MANIFEST_REQUIRE_SERVICE_JWT
        value: "true"
      - key: SEED_MANIFEST_SERVICE_ISSUER
        value: job-intel-api
      - key: SEED_MANIFEST_SERVICE_AUDIENCE
        value: job-intel-api
      - key: SEED_MANIFEST_SERVICE_SIGNING_SECRET
        sync: false
      - key: DISCOVERY_USER_AGENT
        value: agent-apply-discovery-bot/1.0
      - key: DISCOVERY_CONTACT_EMAIL
        sync: false
      - key: DISCOVERY_DEFAULT_CRAWL_DELAY_SECONDS
        value: "2"
      - key: DISCOVERY_MAX_RETRIES
        value: "3"
      - key: DISCOVERY_TIMEOUT_SECONDS
        value: "20"
      - key: TOKEN_VALIDATION_RECHECK_HOURS
        value: "24"
      - key: JOB_LISTING_TTL_DAYS
        value: "21"
      - key: CLOUD_HTTP_TIMEOUT_SECONDS
        value: "20"
      - key: DISCOVERY_WORKER_LOOP_SLEEP_SECONDS
        value: "15"

  - type: worker
    name: seed-manifest-worker
    env: python
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cloud_automation.workers.seed_manifest_worker
    envVars:
      - key: JOBS_DATABASE_URL
        fromDatabase:
          name: jobs-postgres
          property: connectionString
      - key: SEED_SOURCE_PAGE_URLS
        value: https://remoteintech.company/companies/,https://remoteintech.company/browse/worldwide/,https://remoteintech.company/browse/americas/,https://remoteintech.company/browse/europe/,https://remoteintech.company/browse/fully-remote/,https://remoteintech.company/browse/remote-first/,https://remoteintech.company/browse/remote-friendly/,https://remoteintech.company/browse/hybrid/,https://remoteintech.company/browse/python/,https://remoteintech.company/browse/javascript/
      - key: SEED_MANIFEST_BUILD_INTERVAL_SECONDS
        value: "86400"
      - key: SEED_MANIFEST_MAX_RETRIES
        value: "3"
      - key: SEED_MANIFEST_TIMEOUT_SECONDS
        value: "20"
      - key: DISCOVERY_USER_AGENT
        value: agent-apply-discovery-bot/1.0
      - key: DISCOVERY_CONTACT_EMAIL
        sync: false
      - key: DISCOVERY_DEFAULT_CRAWL_DELAY_SECONDS
        value: "2"
      - key: DISCOVERY_MAX_RETRIES
        value: "3"
      - key: DISCOVERY_TIMEOUT_SECONDS
        value: "20"
      - key: CLOUD_HTTP_TIMEOUT_SECONDS
        value: "20"

  - type: worker
    name: common-crawl-worker
    env: python
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cloud_automation.workers.common_crawl_worker
    envVars:
      - key: JOBS_DATABASE_URL
        fromDatabase:
          name: jobs-postgres
          property: connectionString
      - key: COMMON_CRAWL_INTERVAL_SECONDS
        value: "86400"
      - key: COMMON_CRAWL_LOOKBACK_INDEXES
        value: "2"
      - key: COMMON_CRAWL_MAX_PAGES_PER_PATTERN
        value: "3"
      - key: COMMON_CRAWL_MAX_RECORDS_PER_PATTERN
        value: "1500"
      - key: DISCOVERY_TIMEOUT_SECONDS
        value: "20"
      - key: DISCOVERY_USER_AGENT
        value: agent-apply-common-crawl-bot/1.0
      - key: TOKEN_VALIDATION_RECHECK_HOURS
        value: "24"
      - key: CLOUD_HTTP_TIMEOUT_SECONDS
        value: "20"
      - key: JOB_LISTING_TTL_DAYS
        value: "21"

  - type: worker
    name: apply-worker
    env: python
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cloud_automation.workers.apply_worker
    envVars:
      - key: JOBS_DATABASE_URL
        fromDatabase:
          name: jobs-postgres
          property: connectionString
      - key: MAIN_CALLBACK_URL
        value: https://main-api.onrender.com/internal/cloud/callbacks/apply-result
      - key: CLOUD_CALLBACK_ISSUER
        value: job-intel-api
      - key: CLOUD_CALLBACK_AUDIENCE
        value: main-api
      - key: CLOUD_CALLBACK_SIGNING_SECRET
        sync: false
      - key: CLOUD_CALLBACK_SIGNATURE_SECRET
        sync: false
      - key: JOB_LISTING_TTL_DAYS
        value: "21"
      - key: CLOUD_HTTP_TIMEOUT_SECONDS
        value: "20"
      - key: APPLY_WORKER_CONCURRENCY
        value: "1"
      - key: CALLBACK_RETRY_MAX_ATTEMPTS
        value: "3"
      - key: CALLBACK_RETRY_BASE_DELAY_MS
        value: "250"

  - type: worker
    name: match-worker
    env: python
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cloud_automation.workers.match_worker
    envVars:
      - key: JOBS_DATABASE_URL
        fromDatabase:
          name: jobs-postgres
          property: connectionString
      - key: JOB_LISTING_TTL_DAYS
        value: "21"
      - key: MATCH_WORKER_CONCURRENCY
        value: "1"

  - type: worker
    name: maintenance-worker
    env: python
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cloud_automation.workers.maintenance_worker
    envVars:
      - key: JOBS_DATABASE_URL
        fromDatabase:
          name: jobs-postgres
          property: connectionString
      - key: JOB_LISTING_TTL_DAYS
        value: "21"
